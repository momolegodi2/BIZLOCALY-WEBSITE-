<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enquiry - BizLocaly</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>BizLocaly</h1>
        </div>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Get Involved with BizLocaly</h2>
        <p>Join us in supporting local retail communities!</p>

        <form class="enquiry-form" id="enquiryForm">
            <label for="fullname">Full Name:*</label>
            <input type="text" id="fullname" name="fullname" required>

            <label for="email">Email Address:*</label>
            <input type="email" id="email" name="email" required>

            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone">

            <label for="enquiryType">I want to:*</label>
            <select id="enquiryType" name="enquiryType" required>
                <option value="">Select an option</option>
                <option value="volunteer">Volunteer - Help local businesses</option>
                <option value="sponsor">Become a Sponsor</option>
                <option value="partner">Partner with BizLocaly</option>
            </select>

            <label for="message">Your Message:*</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit" class="submit-btn">Submit Enquiry</button>
        </form>
        <div id="formMessage"></div>
    </main>

    <footer>
        <p>&copy; 2026 BizLocaly - Supporting Local Retail</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
